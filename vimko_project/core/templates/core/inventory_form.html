{% extends 'core/base.html' %}

{% block content %}

<h2 class="mb-3">Add / Update Inventory</h2>

<div class="card p-4 shadow-sm">
    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-warning">💾 Save</button>
        <a href="{% url 'inventory_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
