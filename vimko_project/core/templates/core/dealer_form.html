{% extends 'core/base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Add / Update Dealer</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Save</button>
        <a href="{% url 'dealer_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
